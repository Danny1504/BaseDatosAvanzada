services:
  db:
    container_name: postgres_database
    image: postgres:15.1
    volumes:
      - postgres-db:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=almaraz236

  pgAdmin:
    depends_on:
      - db
    image: dpage/pgadmin4:6.17
    ports:
      - "8092:80"
    environment:
      - PGADMIN_DEFAULT_PASSWORD=almaraz236
      - PGADMIN_DEFAULT_EMAIL=dalmarazalcantara@gmail.com 

volumes:
  postgres-db:
    external: true